<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>OUR WEDDING — 誠摯邀請</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #f7f5f0;
        }
        .eng-font {
            font-family: 'Cormorant Garamond', serif;
        }
        /* 絲滑轉場效果 */
        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased selection:bg-emerald-100 selection:text-emerald-900">

    <div class="w-full h-1.5 bg-emerald-800"></div>

    <main class="flex-grow flex items-center justify-center px-4 py-12 md:py-24">
        <div class="max-w-xl w-full bg-white rounded-3xl shadow-[0_20px_50px_rgba(115,115,115,0.15)] border border-stone-200/60 overflow-hidden fade-in">
            
            <div class="p-8 text-center border-b border-stone-100 bg-stone-50/50">
                <p class="eng-font text-stone-400 text-sm tracking-[0.3em] uppercase mb-2">The Wedding Invitation</p>
                <h1 class="text-2xl md:text-3xl font-medium tracking-widest text-stone-800 mb-1">我們的婚禮午宴</h1>
                <p class="text-xs text-stone-400 tracking-wider">NOVEMBER 15, 2026</p>
            </div>

            <div class="p-8 md:p-10">
                <form id="rsvpForm" class="space-y-8">
                    
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-stone-600 tracking-wider">
                            賓客姓名 <span class="text-emerald-700">*</span>
                        </label>
                        <input type="text" name="name" required placeholder="請填寫您的真實姓名" 
                            class="w-full bg-stone-50/50 border border-stone-200 rounded-xl px-4 py-3 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700 transition duration-300">
                    </div>

                    <div class="space-y-3">
                        <label class="block text-sm font-medium text-stone-600 tracking-wider">出席意願 <span class="text-emerald-700">*</span></label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <label class="relative flex flex-col p-5 border border-stone-200 rounded-2xl cursor-pointer hover:bg-stone-50/50 transition group peer-checked:border-emerald-700">
                                <input type="radio" name="attendance" value="出席" checked class="absolute right-4 top-5 text-emerald-700 focus:ring-emerald-600 h-4 w-4 border-stone-300">
                                <span class="block text-base font-medium text-stone-800 mb-1">滿心期待前往</span>
                                <span class="block text-xs text-stone-400">一同見證與分享幸福</span>
                            </label>
                            <label class="relative flex flex-col p-5 border border-stone-200 rounded-2xl cursor-pointer hover:bg-stone-50/50 transition group">
                                <input type="radio" name="attendance" value="不克前往" class="absolute right-4 top-5 text-emerald-700 focus:ring-emerald-600 h-4 w-4 border-stone-300">
                                <span class="block text-base font-medium text-stone-800 mb-1">不克前往</span>
                                <span class="block text-xs text-stone-400">遙寄最真摯的祝福</span>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-baseline">
                            <label class="block text-sm font-medium text-stone-600 tracking-wider">飲食習慣 <span
