<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>OUR WEDDING — 誠摯邀請</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #f7f5f0;
        }
        .eng-font {
            font-family: 'Cormorant Garamond', serif;
        }
        /* 絲滑轉場效果 */
        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased selection:bg-emerald-100 selection:text-emerald-900">

    <div class="w-full h-1.5 bg-emerald-800"></div>

    <main class="flex-grow flex items-center justify-center px-4 py-12 md:py-24">
        <div class="max-w-xl w-full bg-white rounded-3xl shadow-[0_20px_50px_rgba(115,115,115,0.15)] border border-stone-200/60 overflow-hidden fade-in">
            
            <div class="p-8 text-center border-b border-stone-100 bg-stone-50/50">
                <p class="eng-font text-stone-400 text-sm tracking-[0.3em] uppercase mb-2">The Wedding Invitation</p>
                <h1 class="text-2xl md:text-3xl font-medium tracking-widest text-stone-800 mb-1">我們的婚禮午宴</h1>
                <p class="text-xs text-stone-400 tracking-wider">NOVEMBER 15, 2026</p>
            </div>

            <div class="p-8 md:p-10">
                <form id="rsvpForm" class="space-y-8">
                    
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-stone-600 tracking-wider">
                            賓客姓名 <span class="text-emerald-700">*</span>
                        </label>
                        <input type="text" name="name" required placeholder="請填寫您的真實姓名" 
                            class="w-full bg-stone-50/50 border border-stone-200 rounded-xl px-4 py-3 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700 transition duration-300">
                    </div>

                    <div class="space-y-3">
                        <label class="block text-sm font-medium text-stone-600 tracking-wider">出席意願 <span class="text-emerald-700">*</span></label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <label class="relative flex flex-col p-5 border border-stone-200 rounded-2xl cursor-pointer hover:bg-stone-50/50 transition group peer-checked:border-emerald-700">
                                <input type="radio" name="attendance" value="出席" checked class="absolute right-4 top-5 text-emerald-700 focus:ring-emerald-600 h-4 w-4 border-stone-300">
                                <span class="block text-base font-medium text-stone-800 mb-1">滿心期待前往</span>
                                <span class="block text-xs text-stone-400">一同見證與分享幸福</span>
                            </label>
                            <label class="relative flex flex-col p-5 border border-stone-200 rounded-2xl cursor-pointer hover:bg-stone-50/50 transition group">
                                <input type="radio" name="attendance" value="不克前往" class="absolute right-4 top-5 text-emerald-700 focus:ring-emerald-600 h-4 w-4 border-stone-300">
                                <span class="block text-base font-medium text-stone-800 mb-1">不克前往</span>
                                <span class="block text-xs text-stone-400">遙寄最真摯的祝福</span>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-baseline">
                            <label class="block text-sm font-medium text-stone-600 tracking-wider">飲食習慣 <span class="text-emerald-700">*</span></label>
                            <span class="text-[11px] text-emerald-800 bg-emerald-50 px-2 py-0.5 rounded-md">純植物蔬食宴</span>
                        </div>
                        <select name="diet" class="w-full bg-stone-50/50 border border-stone-200 rounded-xl px-4 py-3 text-stone-700 focus:outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700 transition duration-300">
                            <option value="純素 (無五辛)">純素 (無五辛)</option>
                            <option value="植物五辛素" selected>植物五辛素</option>
                            <option value="蛋奶素亦可">健康隨緣（皆可）</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-stone-600 tracking-wider">想對新人說的話</label>
                        <textarea name="blessing" rows="3" placeholder="留下您的溫馨祝福與話語..." 
                            class="w-full bg-stone-50/50 border border-stone-200 rounded-xl px-4 py-3 text-stone-800 placeholder-stone-300 focus:outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700 transition duration-300 resize-none"></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-stone-800 hover:bg-emerald-800 text-stone-100 font-medium tracking-widest py-4 px-6 rounded-xl transition duration-300 shadow-md hover:shadow-xl transform active:scale-[0.99] block text-center">
                        確認送出回覆
                    </button>
                </form>
            </div>
            
            <div class="bg-stone-50 p-6 text-center border-t border-stone-100 text-stone-400 text-xs space-y-1">
                <p class="tracking-wide">時間：2026.11.15 12:00 入席</p>
                <p class="tracking-wide">地點：十五純植物餐廳 (新竹市東區)</p>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-[10px] eng-font text-stone-400 tracking-[0.2em] uppercase">
        © 2026 OUR WEDDING. ALL RIGHTS RESERVED.
    </footer>

    <script>
document.getElementById('rsvpForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "傳送中... PLEASE WAIT";
        submitBtn.classList.add('opacity-70');
        
        // 🚀 確保這裡的網址與你目前 PowerShell 視窗內顯示的一致
        const API_URL = "https://agencies-clause-act-tough.trycloudflare.com/submit_rsvp"; 
        
        // 🛠️ 改回標準表單格式發送
        const formData = new FormData(this);
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                // 🛑 注意：傳送 FormData 時，絕對不能寫 headers: {'Content-Type': ...}，瀏覽器會自動處理
                body: formData 
            });
            
            const result = await response.json();
            
            if (response.ok && result.status === 'success') {
                alert('✨ 謝謝您的回覆！我們十一月見。');
                this.reset();
            } else {
                alert('❌ 系統似乎有些小狀況，請稍後再試。');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('❌ 目前無法連線至本地伺服器，請確認 Docker 容器與 Cloudflare 視窗是否正常運行。');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "確認送出回覆";
            submitBtn.classList.remove('opacity-70');
        }
    });
    </script>
</body>
</html>
